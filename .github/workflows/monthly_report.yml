name: Monthly Report

on:
  schedule:
    - cron: '0 7 1 * *'  # 1er du mois à 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate monthly report
        run: node scripts/generate_monthly_report.js

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "report: monthly stats $(date -u '+%Y-%m')"
          git push

      - name: Create GitHub issue notification
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('reports/latest_summary.md', 'utf8');
            const d = new Date();
            const month = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `📊 Rapport Mensuel ${month}`,
              body:  summary,
              labels: ['monthly-report']
            });
